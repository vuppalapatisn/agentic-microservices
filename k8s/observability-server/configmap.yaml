apiVersion: v1
kind: ConfigMap
metadata:
  name: observability-server-config
  namespace: observability
data:
  OBSERVABILITY_LOKI_BASE_URL: "http://loki.observability.svc.cluster.local:3100"
  OBSERVABILITY_LOKI_TIMEOUT_SECONDS: "5"
  OBSERVABILITY_PROMETHEUS_BASE_URL: "http://prometheus.observability.svc.cluster.local:9090"
  OBSERVABILITY_PROMETHEUS_TIMEOUT_SECONDS: "5"
