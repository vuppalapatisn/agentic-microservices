# Apply once per namespace before deploying:
#   kubectl create secret docker-registry dockerhub-registry-secret \
#     --docker-server=https://index.docker.io/v1/ \
#     --docker-username=<DOCKERHUB_USERNAME> \
#     --docker-password=<DOCKERHUB_TOKEN> \
#     --docker-email=<EMAIL> \
#     --namespace=ecommerce
#
#   kubectl create secret docker-registry dockerhub-registry-secret \
#     --docker-server=https://index.docker.io/v1/ \
#     --docker-username=<DOCKERHUB_USERNAME> \
#     --docker-password=<DOCKERHUB_TOKEN> \
#     --docker-email=<EMAIL> \
#     --namespace=observability
#
# The YAML below is a placeholder — replace <BASE64_DOCKERCONFIG_JSON>
# with the output of:
#   cat ~/.docker/config.json | base64 -w 0
---
apiVersion: v1
kind: Secret
metadata:
  name: dockerhub-registry-secret
  namespace: ecommerce
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: <BASE64_DOCKERCONFIG_JSON>
---
apiVersion: v1
kind: Secret
metadata:
  name: dockerhub-registry-secret
  namespace: observability
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: <BASE64_DOCKERCONFIG_JSON>
