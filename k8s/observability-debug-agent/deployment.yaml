apiVersion: apps/v1
kind: Deployment
metadata:
  name: observability-debug-agent
  namespace: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: observability-debug-agent
  template:
    metadata:
      labels:
        app: observability-debug-agent
    spec:
      imagePullSecrets:
        - name: dockerhub-registry-secret
      containers:
        - name: observability-debug-agent
          image: docker.io/sudhavuppalapati/observability-debug-agent:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: observability-debug-agent-config
            - secretRef:
                name: observability-debug-agent-secret
                optional: true
          ports:
            - containerPort: 8092
          startupProbe:
            httpGet:
              path: /health
              port: 8092
            periodSeconds: 5
            failureThreshold: 24
          readinessProbe:
            httpGet:
              path: /health
              port: 8092
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8092
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 300m
              memory: 512Mi
