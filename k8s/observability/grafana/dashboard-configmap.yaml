apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-ecommerce
  namespace: observability
data:
  ecommerce-observability.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "uid": "ecommerce-observability",
      "links": [],
      "panels": [
        {
          "datasource": "Prometheus",
          "fieldConfig": {"defaults": {"unit": "bytes"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "id": 1,
          "targets": [{"expr": "jvm_memory_used_bytes{job=\"ecommerce\",area=\"heap\"}", "refId": "A"}],
          "title": "Heap Used",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {"defaults": {"unit": "bytes"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "id": 2,
          "targets": [{"expr": "jvm_memory_max_bytes{job=\"ecommerce\",area=\"heap\"}", "refId": "A"}],
          "title": "Heap Max",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {"defaults": {"unit": "none"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
          "id": 3,
          "targets": [{"expr": "jvm_threads_live_threads{job=\"ecommerce\"}", "refId": "A"}],
          "title": "Thread Count",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {"defaults": {"unit": "s"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8},
          "id": 4,
          "targets": [{"expr": "rate(jvm_gc_pause_seconds_sum{job=\"ecommerce\"}[5m])", "refId": "A"}],
          "title": "GC Activity",
          "type": "timeseries"
        }
      ],
      "refresh": "10s",
      "schemaVersion": 39,
      "style": "dark",
      "tags": ["ecommerce"],
      "templating": {"list": []},
      "time": {"from": "now-15m", "to": "now"},
      "timezone": "",
      "title": "Ecommerce Observability",
      "version": 1
    }
