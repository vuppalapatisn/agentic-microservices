apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: observability
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0
    positions:
      filename: /run/promtail/positions.yaml
    clients:
      - url: http://loki.observability.svc.cluster.local:3100/loki/api/v1/push
    scrape_configs:
      # Docker Desktop / containerd: pod logs live under /var/log/pods/<namespace>_<pod>_<uid>/<container>/*.log
      # Static globs avoid kubernetes_sd issues on local K8s clusters.
      - job_name: ecommerce-service
        static_configs:
          - targets: [localhost]
            labels:
              namespace: ecommerce
              app: ecommerce
              __path__: /var/log/pods/ecommerce_ecommerce-*/ecommerce/*.log
        pipeline_stages:
          - cri: {}
      - job_name: product-service
        static_configs:
          - targets: [localhost]
            labels:
              namespace: ecommerce
              app: product
              __path__: /var/log/pods/ecommerce_product-*/product/*.log
        pipeline_stages:
          - cri: {}
      - job_name: images-service
        static_configs:
          - targets: [localhost]
            labels:
              namespace: ecommerce
              app: images
              __path__: /var/log/pods/ecommerce_images-*/images/*.log
        pipeline_stages:
          - cri: {}
      - job_name: observability-agent
        static_configs:
          - targets: [localhost]
            labels:
              namespace: observability
              app: observability-agent
              __path__: /var/log/pods/observability_observability-agent-*/observability-agent/*.log
        pipeline_stages:
          - cri: {}
      - job_name: talk-to-observability-agent
        static_configs:
          - targets: [localhost]
            labels:
              namespace: observability
              app: talk-to-observability-agent
              __path__: /var/log/pods/observability_talk-to-observability-agent-*/talk-to-observability-agent/*.log
        pipeline_stages:
          - cri: {}
      - job_name: grafana
        static_configs:
          - targets: [localhost]
            labels:
              namespace: observability
              app: grafana
              __path__: /var/log/pods/observability_grafana-*/grafana/*.log
        pipeline_stages:
          - cri: {}
      - job_name: loki
        static_configs:
          - targets: [localhost]
            labels:
              namespace: observability
              app: loki
              __path__: /var/log/pods/observability_loki-*/loki/*.log
        pipeline_stages:
          - cri: {}
      - job_name: prometheus
        static_configs:
          - targets: [localhost]
            labels:
              namespace: observability
              app: prometheus
              __path__: /var/log/pods/observability_prometheus-*/prometheus/*.log
        pipeline_stages:
          - cri: {}
