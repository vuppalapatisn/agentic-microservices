apiVersion: apps/v1
kind: Deployment
metadata:
  name: talk-to-observability-agent
  namespace: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: talk-to-observability-agent
  template:
    metadata:
      labels:
        app: talk-to-observability-agent
    spec:
      containers:
        - name: talk-to-observability-agent
          image: talk-to-observability-agent:v1
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: talk-to-observability-agent-config
            - secretRef:
                name: talk-to-observability-agent-secret
                optional: true
          ports:
            - containerPort: 8092
          readinessProbe:
            httpGet:
              path: /health
              port: 8092
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8092
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 300m
              memory: 512Mi
