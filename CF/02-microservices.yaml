AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Stack 2 of 3 — ECS Fargate task definitions and services for the five
  agentic-microservices application containers: ecommerce, product, images,
  observability-server, and observability-debug-agent.
  Depends on outputs from 01-infrastructure.yaml.

# ---------------------------------------------------------------------------
Parameters:
# ---------------------------------------------------------------------------
  ProjectName:
    Type: String
    Default: agentic-microservices

  PermissionsBoundaryPolicyName:
    Type: String
    Description: Name of the IAM permissions boundary policy (passed for consistency; roles are created in stack 01).
    Default: ""

# ---------------------------------------------------------------------------
Resources:
# ---------------------------------------------------------------------------

  # =========================================================================
  # ECOMMERCE SERVICE
  # =========================================================================

  EcommerceSDService:
    Type: AWS::ServiceDiscovery::Service
    Properties:
      Name: ecommerce
      NamespaceId: !ImportValue
        Fn::Sub: ${ProjectName}-ServiceDiscoveryNamespaceId
      DnsConfig:
        DnsRecords:
          - Type: SRV
            TTL: 10
        RoutingPolicy: MULTIVALUE
      HealthCheckCustomConfig:
        FailureThreshold: 1

  EcommerceTG:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub ${ProjectName}-ecommerce-tg
      Port: 8090
      Protocol: HTTP
      TargetType: ip
      VpcId: !ImportValue
        Fn::Sub: ${ProjectName}-VpcId
      HealthCheckProtocol: HTTP
      HealthCheckPath: /ecommerce-service/actuator/health
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: "200"

  EcommerceListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !ImportValue
        Fn::Sub: ${ProjectName}-ALBListenerArn
      Priority: 10
      Conditions:
        - Field: path-pattern
          Values:
            - /ecommerceApp*
      Actions:
        - Type: forward
          TargetGroupArn: !Ref EcommerceTG

  EcommerceTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub ${ProjectName}-ecommerce
      Cpu: "512"
      Memory: "1024"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !ImportValue
        Fn::Sub: ${ProjectName}-ECSTaskExecutionRoleArn
      TaskRoleArn: !ImportValue
        Fn::Sub: ${ProjectName}-ECSTaskRoleArn
      ContainerDefinitions:
        - Name: ecommerce
          Image: sudhavuppalapati/ecommerce:latest
          RepositoryCredentials:
            CredentialsParameter: !ImportValue
              Fn::Sub: ${ProjectName}-DockerHubSecretArn
          PortMappings:
            - ContainerPort: 8090
              Protocol: tcp
          Environment:
            - Name: PRODUCT_SERVICE_URL
              Value: !Sub http://product.${ProjectName}.local:8090
            - Name: IMAGES_SERVICE_URL
              Value: !Sub http://images.${ProjectName}.local:8090
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Sub /ecs/${ProjectName}/ecommerce
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs
          Essential: true

  EcommerceService:
    Type: AWS::ECS::Service
    DependsOn: EcommerceListenerRule
    Properties:
      ServiceName: !Sub ${ProjectName}-ecommerce
      Cluster: !ImportValue
        Fn::Sub: ${ProjectName}-ECSClusterName
      TaskDefinition: !Ref EcommerceTaskDefinition
      LaunchType: FARGATE
      DesiredCount: 1
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets:
            - !ImportValue
              Fn::Sub: ${ProjectName}-PrivateSubnet1Id
            - !ImportValue
              Fn::Sub: ${ProjectName}-PrivateSubnet2Id
          SecurityGroups:
            - !ImportValue
              Fn::Sub: ${ProjectName}-ECSSecurityGroupId
      LoadBalancers:
        - ContainerName: ecommerce
          ContainerPort: 8090
          TargetGroupArn: !Ref EcommerceTG
      ServiceRegistries:
        - RegistryArn: !GetAtt EcommerceSDService.Arn
          Port: 8090

