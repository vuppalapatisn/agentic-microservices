          Port: 8090

  # =========================================================================
  # OBSERVABILITY SERVER
  # =========================================================================

  ObsServerSDService:
    Type: AWS::ServiceDiscovery::Service
    Properties:
      Name: observability-server
      NamespaceId: !ImportValue
