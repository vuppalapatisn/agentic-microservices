          AssignPublicIp: DISABLED
          Subnets:
            - !ImportValue
              Fn::Sub: ${ProjectName}-PrivateSubnet1Id
            - !ImportValue
              Fn::Sub: ${ProjectName}-PrivateSubnet2Id
          SecurityGroups:
            - !ImportValue
              Fn::Sub: ${ProjectName}-ECSSecurityGroupId
      LoadBalancers:
        - ContainerName: images
          ContainerPort: 8090
          TargetGroupArn: !Ref ImagesTG
      ServiceRegistries:
