              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs
          Essential: true

  ProductService:
    Type: AWS::ECS::Service
    DependsOn: ProductListenerRule
    Properties:
      ServiceName: !Sub ${ProjectName}-product
      Cluster: !ImportValue
        Fn::Sub: ${ProjectName}-ECSClusterName
      TaskDefinition: !Ref ProductTaskDefinition
      LaunchType: FARGATE
      DesiredCount: 1
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets:
            - !ImportValue
              Fn::Sub: ${ProjectName}-PrivateSubnet1Id
            - !ImportValue
              Fn::Sub: ${ProjectName}-PrivateSubnet2Id
          SecurityGroups:
            - !ImportValue
              Fn::Sub: ${ProjectName}-ECSSecurityGroupId
      LoadBalancers:
        - ContainerName: product
          ContainerPort: 8090
          TargetGroupArn: !Ref ProductTG
      ServiceRegistries:
        - RegistryArn: !GetAtt ProductSDService.Arn
          Port: 8090

  # =========================================================================
  # IMAGES SERVICE
  # =========================================================================

  ImagesSDService:
    Type: AWS::ServiceDiscovery::Service
    Properties:
      Name: images
