name: Build and Push Observability Debug Agent

on:
  push:
    branches:
      - main
    paths:
      - "microservices/observability-debug-agent/**"
      - ".github/workflows/docker-image.yml"
  workflow_dispatch:

env:
  IMAGE_NAME: sudhavuppalapati/observability-debug-agent

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v4

      - name: ✅ Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: ✅ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: ✅ Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: ✅ Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./microservices/observability-debug-agent
          file: ./microservices/observability-debug-agent/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          no-cache: true
          tags: |
            sudhavuppalapati/observability-debug-agent:latest
``
