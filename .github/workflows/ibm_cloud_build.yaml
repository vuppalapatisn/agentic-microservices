name: IBM Cloud - Build, Push & Deploy

# ---------------------------------------------------------------------------
# Full equivalent of deploy-ibm-cloud.sh, run in CI instead of locally:
#   - build each service with Maven, docker build, docker push
#   - point kubectl at the IBM Cloud Kubernetes Service (IKS) cluster
#   - apply the ecommerce/observability namespaces
#   - warn if the dockerhub-registry-secret pull secret is missing
#   - apply the service manifests (product, images, ecommerce, ingress,
#     the observability stack, observability-server, observability-debug-agent)
#   - kubectl set image each deployment to the freshly pushed tag
#   - wait on kubectl rollout status for every deployment
#   - print final pod/service/ingress status to the job summary
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   DOCKER_USERNAME     Docker Hub username (same secret used by docker_build.yaml)
#   DOCKER_PASSWORD     Docker Hub access token (same secret used by docker_build.yaml)
#   IBM_CLOUD_API_KEY   IBM Cloud IAM API key with access to the target cluster
#
# Prerequisite (one-time, not automated here): the dockerhub-registry-secret
# image pull secret must already exist in both the ecommerce and
# observability namespaces — see k8s/dockerhub-secret.yaml for the exact
# kubectl create secret command. Without it, pods will sit in
# ImagePullBackOff and the rollout status steps below will time out.
# ---------------------------------------------------------------------------

on:
  push:
    branches:
      - master
      - main
    paths:
      - "microservices/**"
      - "k8s/namespace.yaml"
      - "k8s/observability/namespace.yaml"
      - ".github/workflows/ibm_cloud_build.yaml"
  workflow_dispatch: {}

env:
  DOCKERHUB_NAMESPACE: sudhavuppalapati
  IKS_CLUSTER_ID: d92fbhuh0h54olrrmsfg
  # Chennai, India. Verify with `ibmcloud regions` if the cluster ever moves.
  IBM_CLOUD_REGION: in-che

jobs:
  build-push-deploy:
    name: Build, push images & deploy to IBM Cloud
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Set image tag
        id: tag
        run: echo "tag=$(date +%Y%m%d%H%M%S)" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push observability-server
        working-directory: microservices/observability-server
        run: |
          mvn clean package
          docker build --no-cache -t docker.io/${{ env.DOCKERHUB_NAMESPACE }}/observability-server:${{ steps.tag.outputs.tag }} .
          docker push docker.io/${{ env.DOCKERHUB_NAMESPACE }}/observability-server:${{ steps.tag.outputs.tag }}

      - name: Build & push observability-debug-agent
        working-directory: microservices/observability-debug-agent
        run: |
          docker build --no-cache -t docker.io/${{ env.DOCKERHUB_NAMESPACE }}/observability-debug-agent:${{ steps.tag.outputs.tag }} .
          docker push docker.io/${{ env.DOCKERHUB_NAMESPACE }}/observability-debug-agent:${{ steps.tag.outputs.tag }}

      - name: Build & push product
        working-directory: microservices/product
        run: |
          mvn clean package
          docker build --no-cache -t docker.io/${{ env.DOCKERHUB_NAMESPACE }}/product:${{ steps.tag.outputs.tag }} .
          docker push docker.io/${{ env.DOCKERHUB_NAMESPACE }}/product:${{ steps.tag.outputs.tag }}

      - name: Build & push images
        working-directory: microservices/images
        run: |
          mvn clean package
          docker build --no-cache -t docker.io/${{ env.DOCKERHUB_NAMESPACE }}/images:${{ steps.tag.outputs.tag }} .
          docker push docker.io/${{ env.DOCKERHUB_NAMESPACE }}/images:${{ steps.tag.outputs.tag }}

      - name: Build & push ecommerce
        working-directory: microservices/ecommerce
        run: |
          mvn clean package
          docker build --no-cache -t docker.io/${{ env.DOCKERHUB_NAMESPACE }}/ecommerce:${{ steps.tag.outputs.tag }} .
          docker push docker.io/${{ env.DOCKERHUB_NAMESPACE }}/ecommerce:${{ steps.tag.outputs.tag }}

      - name: Install IBM Cloud CLI
        run: |
          curl -fsSL https://clis.cloud.ibm.com/install/linux | sh
          ibmcloud plugin install kubernetes-service -f

      - name: Log in to IBM Cloud & configure kubectl
        run: |
          ibmcloud login --apikey "${{ secrets.IBM_CLOUD_API_KEY }}" -r "${{ env.IBM_CLOUD_REGION }}"
          ibmcloud ks cluster config --cluster "${{ env.IKS_CLUSTER_ID }}"

      - name: Apply namespaces
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/observability/namespace.yaml

      - name: Check image pull secret exists
        run: |
          for ns in ecommerce observability; do
            if ! kubectl get secret dockerhub-registry-secret -n "$ns" >/dev/null 2>&1; then
              echo "::warning::secret 'dockerhub-registry-secret' not found in namespace '$ns'. Pods will fail to pull images (ImagePullBackOff) until you create it — see k8s/dockerhub-secret.yaml."
            fi
          done

      - name: Apply application manifests
        run: |
          kubectl apply -f k8s/product
          kubectl apply -f k8s/images
          kubectl apply -f k8s/ecommerce
          kubectl apply -f k8s/ingress

      - name: Apply observability stack manifests
        run: |
          kubectl apply -f k8s/observability/prometheus
          kubectl apply -f k8s/observability/loki
          kubectl apply -f k8s/observability/promtail
          kubectl apply -f k8s/observability/grafana
          kubectl apply -f k8s/observability-server
          kubectl apply -f k8s/observability-debug-agent/configmap.yaml
          kubectl apply -f k8s/observability-debug-agent/deployment.yaml
          kubectl apply -f k8s/observability-debug-agent/service.yaml

      - name: Roll out pushed image tag
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          NS="${{ env.DOCKERHUB_NAMESPACE }}"
          kubectl set image deployment/product product=docker.io/$NS/product:$TAG -n ecommerce
          kubectl set image deployment/images images=docker.io/$NS/images:$TAG -n ecommerce
          kubectl set image deployment/ecommerce ecommerce=docker.io/$NS/ecommerce:$TAG -n ecommerce
          kubectl set image deployment/observability-server observability-server=docker.io/$NS/observability-server:$TAG -n observability
          kubectl set image deployment/observability-debug-agent observability-debug-agent=docker.io/$NS/observability-debug-agent:$TAG -n observability

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/product -n ecommerce --timeout=300s
          kubectl rollout status deployment/images -n ecommerce --timeout=300s
          kubectl rollout status deployment/ecommerce -n ecommerce --timeout=300s
          kubectl rollout status deployment/prometheus -n observability --timeout=300s
          kubectl rollout status deployment/loki -n observability --timeout=300s
          kubectl rollout status deployment/grafana -n observability --timeout=300s
          kubectl rollout status deployment/observability-server -n observability --timeout=300s
          kubectl rollout status deployment/observability-debug-agent -n observability --timeout=300s

      - name: Summary
        if: always()
        run: |
          {
            echo "## IBM Cloud deployment"
            echo ""
            echo "Image tag: \`${{ steps.tag.outputs.tag }}\`"
            echo ""
            echo "### Pods (ecommerce)"
            echo '```'
            kubectl get pods -n ecommerce
            echo '```'
            echo "### Pods (observability)"
            echo '```'
            kubectl get pods -n observability
            echo '```'
            echo "### Services (ecommerce)"
            echo '```'
            kubectl get svc -n ecommerce
            echo '```'
            echo "### Ingress (ecommerce)"
            echo '```'
            kubectl get ingress -n ecommerce
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
