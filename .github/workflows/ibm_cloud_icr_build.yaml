name: IBM Cloud (ICR) - Build, Push & Deploy

# ---------------------------------------------------------------------------
# Same end result as deploy-ibm-cloud-icr.sh, run in CI: builds each service,
# pushes it to IBM Cloud Container Registry (icr.io/agentic/<service>:<tag>)
# instead of Docker Hub, then applies the k8s manifests and rolls out the
# new tag on the IBM Cloud Kubernetes Service (IKS) cluster.
#
# Why ICR instead of Docker Hub: ICR sits on IBM's own network, so IKS
# worker nodes can reach it without needing outbound internet access (no
# VPC Public Gateway dependency, unlike pulling from docker.io). IKS
# clusters also get automatic image-pull access to ICR namespaces in the
# same IBM Cloud account, with no manual imagePullSecret required.
#
# Required repository secret (Settings -> Secrets and variables -> Actions):
#   IBM_CLOUD_API_KEY   IBM Cloud IAM API key with access to the target
#                        cluster AND to Container Registry (used for both
#                        `ibmcloud login` and `ibmcloud cr login`)
# ---------------------------------------------------------------------------

on:
  push:
    branches:
      - IBMcloud
    paths:
      - "microservices/**"
      - "k8s/namespace.yaml"
      - "k8s/observability/namespace.yaml"
      - ".github/workflows/ibm_cloud_icr_build.yaml"
  workflow_dispatch: {}

env:
  ICR_REGISTRY: icr.io
  ICR_NAMESPACE: agentic
  IKS_CLUSTER_ID: d92fbhuh0h54olrrmsfg
  # Chennai, India. Verify with `ibmcloud regions` if the cluster ever moves.
  IBM_CLOUD_REGION: in-che

jobs:
  build-push-deploy:
    name: Build, push images to ICR & deploy to IBM Cloud
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Set image tag
        id: tag
        run: echo "tag=$(date +%Y%m%d%H%M%S)" >> "$GITHUB_OUTPUT"

      - name: Install IBM Cloud CLI
        run: |
          curl -fsSL https://clis.cloud.ibm.com/install/linux | sh
          ibmcloud plugin install kubernetes-service -f
          ibmcloud plugin install container-registry -f

      - name: Log in to IBM Cloud
        run: ibmcloud login --apikey "${{ secrets.IBM_CLOUD_API_KEY }}" -r "${{ env.IBM_CLOUD_REGION }}"

      - name: Log in to IBM Cloud Container Registry
        run: ibmcloud cr login

      - name: Ensure ICR namespace exists
        run: ibmcloud cr namespace-add ${{ env.ICR_NAMESPACE }} || echo "Namespace may already exist, continuing."

      - name: Configure kubectl for the IKS cluster
        run: |
          OUTPUT=$(ibmcloud ks cluster config --cluster "${{ env.IKS_CLUSTER_ID }}")
          echo "$OUTPUT"
          KCPATH=$(echo "$OUTPUT" | grep -oE '/[^ ]*kube-config[^ ]*\.yml')
          if [ -z "$KCPATH" ]; then
            echo "::error::Could not find kubeconfig path in ibmcloud output above"
            exit 1
          fi
          echo "KUBECONFIG=$KCPATH" >> "$GITHUB_ENV"

      - name: Build & push observability-server
        working-directory: microservices/observability-server
        run: |
          mvn clean package
          docker build --no-cache -t ${{ env.ICR_REGISTRY }}/${{ env.ICR_NAMESPACE }}/observability-server:${{ steps.tag.outputs.tag }} .
          docker push ${{ env.ICR_REGISTRY }}/${{ env.ICR_NAMESPACE }}/observability-server:${{ steps.tag.outputs.tag }}

      - name: Build & push observability-debug-agent
        working-directory: microservices/observability-debug-agent
        run: |
          docker build --no-cache -t ${{ env.ICR_REGISTRY }}/${{ env.ICR_NAMESPACE }}/observability-debug-agent:${{ steps.tag.outputs.tag }} .
          docker push ${{ env.ICR_REGISTRY }}/${{ env.ICR_NAMESPACE }}/observability-debug-agent:${{ steps.tag.outputs.tag }}

      - name: Build & push product
        working-directory: microservices/product
        run: |
          mvn clean package
          docker build --no-cache -t ${{ env.ICR_REGISTRY }}/${{ env.ICR_NAMESPACE }}/product:${{ steps.tag.outputs.tag }} .
          docker push ${{ env.ICR_REGISTRY }}/${{ env.ICR_NAMESPACE }}/product:${{ steps.tag.outputs.tag }}

      - name: Build & push images
        working-directory: microservices/images
        run: |
          mvn clean package
          docker build --no-cache -t ${{ env.ICR_REGISTRY }}/${{ env.ICR_NAMESPACE }}/images:${{ steps.tag.outputs.tag }} .
          docker push ${{ env.ICR_REGISTRY }}/${{ env.ICR_NAMESPACE }}/images:${{ steps.tag.outputs.tag }}

      - name: Build & push ecommerce
        working-directory: microservices/ecommerce
        run: |
          mvn clean package
          docker build --no-cache -t ${{ env.ICR_REGISTRY }}/${{ env.ICR_NAMESPACE }}/ecommerce:${{ steps.tag.outputs.tag }} .
          docker push ${{ env.ICR_REGISTRY }}/${{ env.ICR_NAMESPACE }}/ecommerce:${{ steps.tag.outputs.tag }}

      - name: Apply namespaces
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/observability/namespace.yaml

      - name: Apply application manifests
        run: |
          kubectl apply -f k8s/product
          kubectl apply -f k8s/images
          kubectl apply -f k8s/ecommerce
          kubectl apply -f k8s/ingress

      - name: Apply observability stack manifests
        run: |
          kubectl apply -f k8s/observability/prometheus
          kubectl apply -f k8s/observability/loki
          kubectl apply -f k8s/observability/promtail
          kubectl apply -f k8s/observability/grafana
          kubectl apply -f k8s/observability-server
          kubectl apply -f k8s/observability-debug-agent/configmap.yaml
          kubectl apply -f k8s/observability-debug-agent/deployment.yaml
          kubectl apply -f k8s/observability-debug-agent/service.yaml

      - name: Roll out pushed image tag
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          REG="${{ env.ICR_REGISTRY }}/${{ env.ICR_NAMESPACE }}"
          kubectl set image deployment/product product=$REG/product:$TAG -n ecommerce
          kubectl set image deployment/images images=$REG/images:$TAG -n ecommerce
          kubectl set image deployment/ecommerce ecommerce=$REG/ecommerce:$TAG -n ecommerce
          kubectl set image deployment/observability-server observability-server=$REG/observability-server:$TAG -n observability
          kubectl set image deployment/observability-debug-agent observability-debug-agent=$REG/observability-debug-agent:$TAG -n observability

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/product -n ecommerce --timeout=300s
          kubectl rollout status deployment/images -n ecommerce --timeout=300s
          kubectl rollout status deployment/ecommerce -n ecommerce --timeout=300s
          kubectl rollout status deployment/prometheus -n observability --timeout=300s
          kubectl rollout status deployment/loki -n observability --timeout=300s
          kubectl rollout status deployment/grafana -n observability --timeout=300s
          kubectl rollout status deployment/observability-server -n observability --timeout=300s
          kubectl rollout status deployment/observability-debug-agent -n observability --timeout=300s

      - name: Summary
        if: always()
        run: |
          {
            echo "## IBM Cloud (ICR) deployment"
            echo ""
            echo "Image tag: \`${{ steps.tag.outputs.tag }}\`"
            echo "Registry: \`${{ env.ICR_REGISTRY }}/${{ env.ICR_NAMESPACE }}\`"
            echo ""
            echo "### Pods (ecommerce)"
            echo '```'
            kubectl get pods -n ecommerce
            echo '```'
            echo "### Pods (observability)"
            echo '```'
            kubectl get pods -n observability
            echo '```'
            echo "### Services (ecommerce)"
            echo '```'
            kubectl get svc -n ecommerce
            echo '```'
            echo "### Ingress (ecommerce)"
            echo '```'
            kubectl get ingress -n ecommerce
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
