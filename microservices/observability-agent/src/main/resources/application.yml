server:
  port: 8091

spring:
  application:
    name: observability-agent
  ai:
    mcp:
      server:
        name: observability-agent
        version: 0.0.1
        protocol: STREAMABLE
        instructions: Observability MCP server for logs, metrics and service discovery.

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

observability:
  correlation:
    header: X-Correlation-Id
  loki:
    base-url: ${OBSERVABILITY_LOKI_BASE_URL:http://loki.observability.svc.cluster.local:3100}
    timeout-seconds: ${OBSERVABILITY_LOKI_TIMEOUT_SECONDS:5}
  prometheus:
    base-url: ${OBSERVABILITY_PROMETHEUS_BASE_URL:http://prometheus.observability.svc.cluster.local:9090}
    timeout-seconds: ${OBSERVABILITY_PROMETHEUS_TIMEOUT_SECONDS:5}
